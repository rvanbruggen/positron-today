<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A balance scale weighed down by a heavy pile of negative news, with a single glowing positive story being added to the other side">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#fdfaf4"/>
      <stop offset="100%" stop-color="#f5efe3"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- fulcrum -->
  <rect x="592" y="300" width="16" height="230" fill="#5b5347"/>
  <polygon points="600,150 560,300 640,300" fill="#5b5347"/>

  <!-- tilted beam (heavy on the left / negative side) -->
  <g transform="rotate(-13 600 155)">
    <rect x="180" y="146" width="840" height="16" rx="8" fill="#3f3a31"/>
    <circle cx="600" cy="154" r="12" fill="#f59e0b"/>
    <!-- left pan chains -->
    <line x1="235" y1="154" x2="235" y2="250" stroke="#8a8375" stroke-width="3"/>
    <line x1="965" y1="154" x2="965" y2="250" stroke="#8a8375" stroke-width="3"/>
  </g>

  <!-- LEFT pan: heavy pile of negative stories, sits low -->
  <g>
    <path d="M120 470 q115 60 230 0" fill="none" stroke="#3f3a31" stroke-width="4"/>
    <line x1="150" y1="300" x2="130" y2="470" stroke="#8a8375" stroke-width="3"/>
    <line x1="320" y1="300" x2="340" y2="470" stroke="#8a8375" stroke-width="3"/>
    <g fill="#6d665a" font-family="Georgia, serif" text-anchor="middle" font-size="17">
      <rect x="150" y="360" width="170" height="30" rx="4"/><text x="235" y="381" fill="#fdfaf4">war</text>
      <rect x="140" y="392" width="190" height="30" rx="4"/><text x="235" y="413" fill="#fdfaf4">crime &amp; violence</text>
      <rect x="152" y="424" width="166" height="30" rx="4"/><text x="235" y="445" fill="#fdfaf4">economic doom</text>
      <rect x="158" y="330" width="154" height="26" rx="4" fill="#7d7568"/><text x="235" y="349" fill="#fdfaf4" font-size="15">political conflict</text>
    </g>
  </g>

  <!-- RIGHT pan: high up, one glowing positive story -->
  <g>
    <path d="M860 300 q115 40 230 0" fill="none" stroke="#3f3a31" stroke-width="4"/>
    <line x1="880" y1="140" x2="875" y2="300" stroke="#8a8375" stroke-width="3"/>
    <line x1="1050" y1="140" x2="1055" y2="300" stroke="#8a8375" stroke-width="3"/>
    <circle cx="965" cy="250" r="90" fill="url(#glow2)"/>
    <circle cx="965" cy="262" r="30" fill="#f59e0b"/>
    <text x="965" y="273" text-anchor="middle" font-size="34" fill="#fffdf8" font-family="Georgia, serif">+</text>
  </g>

  <text x="600" y="590" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#5b5347" font-style="italic">balance, not denial</text>
</svg>
