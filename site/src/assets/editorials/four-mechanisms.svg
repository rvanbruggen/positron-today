<svg viewBox="0 0 1200 780" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The four mechanisms of negativity bias described by Rozin and Royzman: negative potency, steeper negative gradients, negativity dominance, and negative differentiation">
  <rect width="1200" height="780" fill="#fdfaf4"/>

  <text x="80" y="88" font-family="Georgia, 'Times New Roman', serif" font-size="40" fill="#2b2b2b">four ways bad beats good</text>
  <text x="80" y="128" font-family="Georgia, serif" font-size="21" fill="#7d7568">the mechanisms of negativity bias · Rozin &amp; Royzman, 2001</text>

  <!-- Card 1: negative potency -->
  <g font-family="Georgia, serif">
    <rect x="80" y="170" width="510" height="250" rx="14" fill="#ffffff" stroke="#ecd9b4" stroke-width="1.5"/>
    <circle cx="140" cy="230" r="26" fill="#f59e0b"/><text x="140" y="240" text-anchor="middle" font-size="28" fill="#fffdf8">1</text>
    <text x="186" y="240" font-size="27" fill="#2b2b2b">negative potency</text>
    <text x="110" y="298" font-size="21" fill="#5b5347">the bad simply hits harder than the good,</text>
    <text x="110" y="328" font-size="21" fill="#5b5347">unit for unit. losing 50 euros stings more</text>
    <text x="110" y="358" font-size="21" fill="#5b5347">than finding 50 euros delights.</text>
  </g>

  <!-- Card 2: steeper gradients -->
  <g font-family="Georgia, serif">
    <rect x="610" y="170" width="510" height="250" rx="14" fill="#ffffff" stroke="#ecd9b4" stroke-width="1.5"/>
    <circle cx="670" cy="230" r="26" fill="#f59e0b"/><text x="670" y="240" text-anchor="middle" font-size="28" fill="#fffdf8">2</text>
    <text x="716" y="240" font-size="27" fill="#2b2b2b">steeper gradients</text>
    <text x="640" y="298" font-size="21" fill="#5b5347">as bad things get closer, their dread</text>
    <text x="640" y="328" font-size="21" fill="#5b5347">ramps up faster than good things' promise.</text>
    <text x="640" y="358" font-size="21" fill="#5b5347">bad accelerates.</text>
  </g>

  <!-- Card 3: negativity dominance -->
  <g font-family="Georgia, serif">
    <rect x="80" y="450" width="510" height="250" rx="14" fill="#ffffff" stroke="#ecd9b4" stroke-width="1.5"/>
    <circle cx="140" cy="510" r="26" fill="#f59e0b"/><text x="140" y="520" text-anchor="middle" font-size="28" fill="#fffdf8">3</text>
    <text x="186" y="520" font-size="27" fill="#2b2b2b">negativity dominance</text>
    <text x="110" y="578" font-size="21" fill="#5b5347">mix good and bad and the result feels</text>
    <text x="110" y="608" font-size="21" fill="#5b5347">more negative than the sum. one roach</text>
    <text x="110" y="638" font-size="21" fill="#5b5347">ruins the bowl of cherries.</text>
  </g>

  <!-- Card 4: negative differentiation -->
  <g font-family="Georgia, serif">
    <rect x="610" y="450" width="510" height="250" rx="14" fill="#ffffff" stroke="#ecd9b4" stroke-width="1.5"/>
    <circle cx="670" cy="510" r="26" fill="#f59e0b"/><text x="670" y="520" text-anchor="middle" font-size="28" fill="#fffdf8">4</text>
    <text x="716" y="520" font-size="27" fill="#2b2b2b">negative differentiation</text>
    <text x="640" y="578" font-size="21" fill="#5b5347">we have a richer vocabulary for the bad:</text>
    <text x="640" y="608" font-size="21" fill="#5b5347">more words for pain than pleasure, more</text>
    <text x="640" y="638" font-size="21" fill="#5b5347">categories for things going wrong.</text>
  </g>

  <text x="80" y="750" font-family="Georgia, serif" font-size="17" fill="#a59d8d" font-style="italic">Source: Rozin &amp; Royzman (2001), Negativity Bias, Negativity Dominance, and Contagion</text>
</svg>
