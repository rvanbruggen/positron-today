<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A field of faint negative particles with one glowing positive positron standing out">
  <defs>
    <radialGradient id="bg" cx="62%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#fdfaf4"/>
      <stop offset="100%" stop-color="#f5efe3"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- faint field of negative particles -->
  <g fill="#b9b2a5" font-family="Georgia, 'Times New Roman', serif" text-anchor="middle">
    <g opacity="0.45">
      <circle cx="120" cy="90" r="13"/><text x="120" y="96" font-size="16" fill="#fdfaf4">–</text>
      <circle cx="300" cy="140" r="11"/><text x="300" y="145" font-size="14" fill="#fdfaf4">–</text>
      <circle cx="470" cy="70" r="12"/><text x="470" y="76" font-size="15" fill="#fdfaf4">–</text>
      <circle cx="900" cy="110" r="12"/><text x="900" y="116" font-size="15" fill="#fdfaf4">–</text>
      <circle cx="1080" cy="80" r="13"/><text x="1080" y="86" font-size="16" fill="#fdfaf4">–</text>
      <circle cx="180" cy="260" r="11"/><text x="180" y="265" font-size="14" fill="#fdfaf4">–</text>
      <circle cx="380" cy="330" r="12"/><text x="380" y="336" font-size="15" fill="#fdfaf4">–</text>
      <circle cx="1010" cy="300" r="12"/><text x="1010" y="306" font-size="15" fill="#fdfaf4">–</text>
      <circle cx="1120" cy="230" r="11"/><text x="1120" y="235" font-size="14" fill="#fdfaf4">–</text>
      <circle cx="90" cy="420" r="12"/><text x="90" y="426" font-size="15" fill="#fdfaf4">–</text>
      <circle cx="250" cy="500" r="13"/><text x="250" y="506" font-size="16" fill="#fdfaf4">–</text>
      <circle cx="430" cy="540" r="11"/><text x="430" y="545" font-size="14" fill="#fdfaf4">–</text>
      <circle cx="780" cy="520" r="12"/><text x="780" y="526" font-size="15" fill="#fdfaf4">–</text>
      <circle cx="950" cy="470" r="12"/><text x="950" y="476" font-size="15" fill="#fdfaf4">–</text>
      <circle cx="1100" cy="540" r="13"/><text x="1100" y="546" font-size="16" fill="#fdfaf4">–</text>
      <circle cx="620" cy="120" r="11"/><text x="620" y="125" font-size="14" fill="#fdfaf4">–</text>
      <circle cx="720" cy="250" r="12"/><text x="720" y="256" font-size="15" fill="#fdfaf4">–</text>
      <circle cx="520" cy="430" r="12"/><text x="520" y="436" font-size="15" fill="#fdfaf4">–</text>
      <circle cx="160" cy="150" r="9"/><circle cx="840" cy="380" r="9"/>
      <circle cx="990" cy="180" r="9"/><circle cx="350" cy="220" r="9"/>
      <circle cx="660" cy="560" r="9"/><circle cx="60" cy="300" r="9"/>
    </g>

    <!-- the positron: bright, positive, standing out -->
    <circle cx="720" cy="315" r="150" fill="url(#glow)"/>
    <circle cx="720" cy="315" r="46" fill="#f59e0b"/>
    <circle cx="720" cy="315" r="46" fill="none" stroke="#d97706" stroke-width="2"/>
    <text x="720" y="332" font-size="52" fill="#fffdf8" font-family="Georgia, serif">+</text>
  </g>

  <text x="600" y="600" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#5b5347" font-style="italic">always present, rarely seen</text>
</svg>
