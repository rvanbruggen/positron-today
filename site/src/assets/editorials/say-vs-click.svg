<svg viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two panels contrasting what people say they want (positive news) with what they actually click on (negative news)">
  <rect width="1200" height="620" fill="#fdfaf4"/>

  <text x="80" y="80" font-family="Georgia, 'Times New Roman', serif" font-size="38" fill="#2b2b2b">what we say, and what we click</text>
  <text x="80" y="118" font-family="Georgia, serif" font-size="21" fill="#7d7568">stated preference versus revealed behaviour · Trussler &amp; Soroka, 2014</text>

  <!-- LEFT panel: what we say -->
  <g font-family="Georgia, serif">
    <rect x="80" y="160" width="490" height="380" rx="16" fill="#faeeda" stroke="#ecd9b4" stroke-width="1.5"/>
    <text x="325" y="215" text-anchor="middle" font-size="24" fill="#7d7568">on the survey, we say</text>

    <!-- speech bubble -->
    <rect x="130" y="250" width="390" height="150" rx="18" fill="#ffffff" stroke="#ecd9b4" stroke-width="1.5"/>
    <polygon points="200,400 200,440 245,400" fill="#ffffff" stroke="#ecd9b4" stroke-width="1.5"/>
    <text x="325" y="310" text-anchor="middle" font-size="25" fill="#2b2b2b" font-style="italic">"I'm tired of the doom.</text>
    <text x="325" y="348" text-anchor="middle" font-size="25" fill="#2b2b2b" font-style="italic">I'd prefer positive</text>
    <text x="325" y="386" text-anchor="middle" font-size="25" fill="#2b2b2b" font-style="italic">news, please."</text>

    <circle cx="180" cy="470" r="30" fill="#f59e0b"/>
    <text x="180" y="481" text-anchor="middle" font-size="30" fill="#fffdf8">+</text>
    <text x="225" y="480" font-size="22" fill="#5b5347">the good intention</text>
  </g>

  <!-- RIGHT panel: what we click -->
  <g font-family="Georgia, serif">
    <rect x="630" y="160" width="490" height="380" rx="16" fill="#f1efe8" stroke="#ddd8cb" stroke-width="1.5"/>
    <text x="875" y="215" text-anchor="middle" font-size="24" fill="#7d7568">in the data, we click</text>

    <!-- headline list, the negative one highlighted -->
    <rect x="680" y="248" width="390" height="46" rx="8" fill="#ffffff" stroke="#e3ddce" stroke-width="1.5"/>
    <text x="700" y="278" font-size="20" fill="#a59d8d">local council approves new park</text>

    <rect x="680" y="304" width="390" height="46" rx="8" fill="#3f3a31"/>
    <text x="700" y="334" font-size="20" fill="#fdfaf4">crisis deepens as talks collapse</text>
    <circle cx="1045" cy="327" r="7" fill="#f7b13f"/>

    <rect x="680" y="360" width="390" height="46" rx="8" fill="#ffffff" stroke="#e3ddce" stroke-width="1.5"/>
    <text x="700" y="390" font-size="20" fill="#a59d8d">study finds modest good news</text>

    <circle cx="730" cy="470" r="30" fill="#3f3a31"/>
    <text x="730" y="481" text-anchor="middle" font-size="30" fill="#fdfaf4">–</text>
    <text x="775" y="480" font-size="22" fill="#5b5347">the actual click</text>
  </g>

  <text x="80" y="590" font-family="Georgia, serif" font-size="17" fill="#a59d8d" font-style="italic">Source: Trussler &amp; Soroka (2014); and Soroka, Fournier &amp; Nir (2019), 17-country study, PNAS</text>
</svg>
