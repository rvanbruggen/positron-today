name: Deploy public site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
  workflow_dispatch:
    inputs:
      retry_attempt:
        description: "Retry attempt number (auto-set by retry job)"
        default: "0"

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Build site
        run: npm run build
        working-directory: site

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/_site

      - uses: actions/deploy-pages@v5
        id: deployment

      # Social posting is no longer triggered from here. The admin server's
      # built-in publish timer (admin/lib/publish-timer.ts) publishes each
      # scheduled article and calls postPendingSocial() itself — polling for
      # Pages liveness before posting. The old /api/post-pending-social route
      # was removed in v2.35.0, so this workflow no longer pings the admin.

  retry-on-failure:
    needs: build-and-deploy
    if: failure() && (inputs.retry_attempt || '0') < '2'
    runs-on: ubuntu-latest
    steps:
      - name: Wait 60s before retry
        run: sleep 60

      - name: Re-trigger deploy (attempt ${{ inputs.retry_attempt && fromJSON(inputs.retry_attempt) + 1 || 1 }})
        run: |
          ATTEMPT=$(( ${{ inputs.retry_attempt || 0 }} + 1 ))
          echo "Retry attempt $ATTEMPT of 2"
          gh workflow run deploy-site.yml \
            --repo "${{ github.repository }}" \
            -f retry_attempt="$ATTEMPT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
