# DISABLED — replaced by Synology NAS Task Scheduler which provides
# reliable cron timing. GitHub Actions free tier was too unpredictable.
#
# Synology tasks to set up:
#   1. Every 30 min:  curl -sf -X POST https://admin.positron.today/api/publish-scheduled
#   2. At run times:  curl -sf -X POST https://admin.positron.today/api/positronitron
#
# Keep workflow_dispatch so it can still be triggered manually from GitHub UI if needed.

name: Scheduled jobs (disabled)

on:
  workflow_dispatch:

jobs:
  publish-scheduled:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger publish-scheduled
        run: |
          curl -sf -X POST \
            "${{ secrets.ADMIN_URL }}/api/publish-scheduled" \
            -o /dev/null -w "HTTP %{http_code}\n" || true

  positronitron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger positronitron
        run: |
          curl -sf -X POST \
            "${{ secrets.ADMIN_URL }}/api/positronitron" \
            -o /dev/null -w "HTTP %{http_code}\n" || true
