name: Scheduled jobs

on:
  schedule:
    # Every 30 minutes — both jobs run; Positronitron self-checks
    # against its configured run times and skips if not due.
    - cron: "*/30 * * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  publish-scheduled:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger publish-scheduled
        run: |
          curl -sf -X POST \
            "${{ secrets.ADMIN_URL }}/api/publish-scheduled" \
            -o /dev/null -w "HTTP %{http_code}\n" || true

  positronitron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger positronitron
        run: |
          curl -sf -X POST \
            "${{ secrets.ADMIN_URL }}/api/positronitron" \
            -o /dev/null -w "HTTP %{http_code}\n" || true
